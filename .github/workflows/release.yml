name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Validate version tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vMAJOR.MINOR.PATCH. Received: $env:RELEASE_TAG"
          }

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ImeTool.sln -r win-x64 -p:SelfContained=true

      - name: Test
        run: dotnet test ImeTool.sln -c Release --no-restore

      - name: Publish win-x64
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^[vV]', ''
          $fullAssetName = "ImeTool-win-x64.exe"
          $liteAssetName = "ImeTool-win-x64-lite.exe"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

          dotnet publish src/ImeTool/ImeTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:Version=$version `
            -p:UpdateAssetName=$fullAssetName `
            -o publish-full

          dotnet publish src/ImeTool/ImeTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            --no-restore `
            -p:Version=$version `
            -p:UpdateAssetName=$liteAssetName `
            -o publish-lite

          Copy-Item "publish-full/ImeTool.exe" "release-assets/$fullAssetName" -Force
          Copy-Item "publish-lite/ImeTool.exe" "release-assets/$liteAssetName" -Force
          foreach ($assetName in @($fullAssetName, $liteAssetName)) {
            $hash = (Get-FileHash "release-assets/$assetName" -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash *$assetName" | Set-Content "release-assets/$assetName.sha256" -Encoding ascii -NoNewline
          }

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create $env:RELEASE_TAG `
            "release-assets/ImeTool-win-x64.exe" `
            "release-assets/ImeTool-win-x64.exe.sha256" `
            "release-assets/ImeTool-win-x64-lite.exe" `
            "release-assets/ImeTool-win-x64-lite.exe.sha256" `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --title "ImeTool $env:RELEASE_TAG" `
            --generate-notes
