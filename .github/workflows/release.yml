name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ImeTool.sln

      - name: Test
        run: dotnet test ImeTool.sln -c Release --no-restore

      - name: Publish win-x64
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^[vV]', ''
          dotnet publish src/ImeTool/ImeTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:Version=$version

          $publishDirectory = "src/ImeTool/bin/Release/net9.0-windows10.0.17763.0/win-x64/publish"
          $assetName = "ImeTool-win-x64.exe"
          Copy-Item "$publishDirectory/ImeTool.exe" $assetName -Force
          $hash = (Get-FileHash $assetName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$assetName" | Set-Content "$assetName.sha256" -Encoding ascii -NoNewline

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "ImeTool-win-x64.exe" `
            "ImeTool-win-x64.exe.sha256" `
            --verify-tag `
            --title "ImeTool ${{ github.ref_name }}" `
            --generate-notes
