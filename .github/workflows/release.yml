name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Validate version tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vMAJOR.MINOR.PATCH. Received: $env:RELEASE_TAG"
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ImeTool.sln

      - name: Test
        run: dotnet test ImeTool.sln -c Release --no-restore

      - name: Publish win-x64
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^[vV]', ''
          dotnet publish src/ImeTool/ImeTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:Version=$version

          $publishDirectory = "src/ImeTool/bin/Release/net9.0-windows10.0.17763.0/win-x64/publish"
          $assetName = "ImeTool-win-x64.exe"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item "$publishDirectory/ImeTool.exe" "release-assets/$assetName" -Force
          $hash = (Get-FileHash "release-assets/$assetName" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$assetName" | Set-Content "release-assets/$assetName.sha256" -Encoding ascii -NoNewline

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create $env:RELEASE_TAG `
            "release-assets/ImeTool-win-x64.exe" `
            "release-assets/ImeTool-win-x64.exe.sha256" `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --title "ImeTool $env:RELEASE_TAG" `
            --generate-notes
