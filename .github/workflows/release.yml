name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Validate version tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vMAJOR.MINOR.PATCH. Received: $env:RELEASE_TAG"
          }

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ImeTool.sln -r win-x64 -p:SelfContained=false

      - name: Test
        run: dotnet test ImeTool.sln -c Release --no-restore

      - name: Setup Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          choco install innosetup --version=6.7.1 --no-progress --yes --allow-downgrade
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "Inno Setup compiler was not found at $iscc"
          }
          "ISCC_PATH=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish and build win-x64 installer
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^[vV]', ''
          $assetName = "ImeTool_Windows_x64.exe"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

          dotnet publish src/ImeTool/ImeTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            --no-restore `
            -p:Version=$version `
            -p:UpdateAssetName=$assetName `
            -o publish

          ./installer/build-installer.ps1 `
            -Version $version `
            -PublishDir "$pwd/publish" `
            -OutputDir "$pwd/release-assets" `
            -IsccPath $env:ISCC_PATH

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets
          path: release-assets

      - name: Prepare release notes
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^[vV]', ''
          $changelog = Get-Content -LiteralPath CHANGELOG.md -Raw
          $escapedVersion = [regex]::Escape($version)
          $pattern = "(?ms)^## \[$escapedVersion\][^\r\n]*\r?\n(?<body>.*?)(?=^## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)
          if (-not $match.Success) {
            throw "CHANGELOG.md does not contain an entry for $env:RELEASE_TAG."
          }

          $notes = $match.Groups['body'].Value.Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) {
            throw "CHANGELOG.md entry for $env:RELEASE_TAG is empty."
          }

          $notes | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding utf8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create $env:RELEASE_TAG `
            "release-assets/ImeTool_Windows_x64.exe" `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --title "ImeTool $env:RELEASE_TAG" `
            --notes-file RELEASE_NOTES.md
